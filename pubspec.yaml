name: "files_utility"
description: "A Files Utility"
publish_to: "none"
version: "1.0.0+1"
environment:
  sdk: "^3.10.8"
dependencies:
  flutter:
    sdk: "flutter"
  cupertino_icons: "^1.0.8"
  file_selector: "^1.0.3"
  path: "^1.9.1"
  intl: "^0.20.2"
  shared_preferences: "^2.5.4"
  logging: "^1.3.0"
  provider: "^6.1.5+1"
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: "flutter"
  flutter_lints: "^6.0.0"
  msix: "^3.16.7"
  inno_bundle: "^0.11.2"
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 256
flutter:
  uses-material-design: true
  assets:
    - "assets/images/app_icon.png"
msix_config:
  display_name: "Files Utility"
  publisher_display_name: "Developer"
  identity_name: "FilesUtility"
  msix_version: "1.0.0.0"
  logo_path: "windows/runner/resources/app_icon.ico"
  capabilities: "internetClient"
inno_bundle:
  id: "45c1dad5-92eb-46d2-b870-e4db4aaeeadd"
  name: "Files Utility"
  publisher: "CodeGenexis"
  installer_icon: "windows/runner/resources/app_icon.ico"
  admin: "auto"
  languages:
    - "english"

# flutter build windows --release
# dart run inno_bundle
# or 
# dart run inno_bundle:build --release --no-app